<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王者荣耀开黑预约系统</title>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-timezone@0.5.43/builds/moment-timezone-with-data.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#C41E3A',
                        secondary: '#1E293B',
                        accent: '#FBBF24',
                    },
                },
            }
        }
    </script>
    <style type="text/css">
        .admin-page { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

<header class="bg-secondary text-white sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa fa-gamepad text-accent text-2xl"></i>
            <h1 class="text-xl font-bold">王者荣耀开黑预约系统</h1>
        </div>
        <div id="headerRight" class="flex flex-col items-end gap-1">
            <div id="userInfo" class="hidden text-sm px-2 py-1 bg-white/10 rounded">
                欢迎：<span id="showName"></span>
                <span id="showLevel" class="ml-1 text-yellow-300"></span>
            </div>
            <div id="remainTip" class="hidden text-xs bg-white/10 px-2 py-0.5 rounded">
                本周剩余：<span id="remainNum" class="text-green-300 font-bold"></span> 次
            </div>
            <button id="logoutBtn" class="hidden bg-red-600 hover:bg-red-700 text-xs px-2 py-1 rounded">
                退出登录
            </button>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-6">
    <div id="statusBar" class="mb-6 p-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-700 hidden">
        <i class="fa fa-info-circle mr-2"></i><span id="statusText"></span>
    </div>

    <div id="loginBox" class="bg-white rounded-xl p-6 card-shadow max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4 text-center">用户登录</h2>
        <p class="text-gray-500 text-sm text-center mb-4">使用游戏昵称登录</p>
        <input type="text" id="loginNick" placeholder="请输入游戏昵称" 
            class="w-full px-4 py-2 border rounded-lg mb-4">
        <button id="loginBtn" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-primary/90">
            登录
        </button>
    </div>

    <div id="userMain" class="hidden">
        <div class="bg-white rounded-xl p-5 mb-8 card-shadow">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <i class="fa fa-calendar-plus-o text-primary mr-2"></i>我要预约
            </h2>
            <form id="userReserveForm" class="grid md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-sm font-medium">游戏昵称</label>
                    <input type="text" id="userNick" readonly class="w-full px-4 py-2 border rounded-lg bg-gray-50">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium">游戏模式</label>
                    <select id="userMode" required class="w-full px-4 py-2 border rounded-lg">
                        <option value="">选择模式</option>
                        <option value="娱乐模式">娱乐模式</option>
                        <option value="技术模式">技术模式</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium">当前段位</label>
                    <input type="text" id="userRank" required placeholder="例如：王者10星"
                        class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium">预约时间段</label>
                    <select id="userSlot" required class="w-full px-4 py-2 border rounded-lg">
                    </select>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg">
                        提交预约
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl p-5 mb-8 card-shadow">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <i class="fa fa-list-alt text-primary mr-2"></i>我的预约记录
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full min-w-[500px] border text-sm">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-2 text-left">模式</th>
                            <th class="p-2 text-left">段位</th>
                            <th class="p-2 text-left">预约时间</th>
                            <th class="p-2 text-left">操作</th>
                        </tr>
                    </thead>
                    <tbody id="myReserveList"></tbody>
                </table>
            </div>
        </div>

        <div class="mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center">
                <i class="fa fa-calendar text-primary mr-2"></i>可预约时间段
            </h2>
            <div id="userSlotContainer" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>
    </div>

    <div id="adminMain" class="hidden">
        <div class="bg-white rounded-xl p-5 card-shadow mb-6">
            <h2 class="text-xl font-bold text-red-600 mb-4">🔑 管理员控制台</h2>
            <div class="flex flex-wrap gap-3 mb-6">
                <button onclick="showAdminPage('detail')" class="bg-blue-600 text-white px-4 py-2 rounded">预约详情</button>
                <button onclick="showAdminPage('help')" class="bg-green-600 text-white px-4 py-2 rounded">帮助预约</button>
                <button onclick="showAdminPage('edit')" class="bg-orange-600 text-white px-4 py-2 rounded">预约修改</button>
                <button onclick="showAdminPage('user')" class="bg-purple-600 text-white px-4 py-2 rounded">用户信息修改</button>
            </div>

            <div id="adminDetailPage" class="admin-page">
                <h3 class="font-bold mb-3">全部用户预约汇总</h3>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[600px] border text-sm">
                        <thead class="bg-gray-100"><tr>
                            <th class="p-2 text-left">用户昵称</th><th class="p-2 text-left">等级</th>
                            <th class="p-2 text-left">模式</th><th class="p-2 text-left">段位</th>
                            <th class="p-2 text-left">预约时间</th>
                        </tr></thead>
                        <tbody id="adminDetailList"></tbody>
                    </table>
                </div>
            </div>

            <div id="adminHelpPage" class="admin-page">
                <h3 class="font-bold mb-3">帮助他人预约</h3>
                <form id="adminHelpForm" class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium">用户昵称</label>
                        <input type="text" id="helpNick" required placeholder="请输入对方游戏昵称" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium">游戏模式</label>
                        <select id="helpMode" required class="w-full px-4 py-2 border rounded-lg">
                            <option value="">选择模式</option><option value="娱乐模式">娱乐模式</option><option value="技术模式">技术模式</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium">段位</label>
                        <input type="text" id="helpRank" required placeholder="例如：王者10星" class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium">时间段</label>
                        <select id="helpSlot" required class="w-full px-4 py-2 border rounded-lg"></select>
                    </div>
                    <div class="md:col-span-2">
                        <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg">代提交预约</button>
                    </div>
                </form>
            </div>

            <div id="adminEditPage" class="admin-page">
                <h3 class="font-bold mb-3">预约管理（修改时间段 / 删除）</h3>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[700px] border text-sm">
                        <thead class="bg-gray-100"><tr>
                            <th class="p-2 text-left">用户</th><th class="p-2 text-left">模式</th><th class="p-2 text-left">段位</th>
                            <th class="p-2 text-left">原时间段</th><th class="p-2 text-left">修改为</th><th class="p-2 text-left">操作</th>
                        </tr></thead>
                        <tbody id="adminEditList"></tbody>
                    </table>
                </div>
            </div>

            <div id="adminUserPage" class="admin-page">
                <h3 class="font-bold mb-3">用户等级管理</h3>
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[500px] border text-sm">
                        <thead class="bg-gray-100"><tr>
                            <th class="p-2 text-left">昵称</th>
                            <th class="p-2 text-left">有效预约数</th>
                            <th class="p-2 text-left">当前等级</th>
                            <th class="p-2 text-left">修改等级</th>
                        </tr></thead>
                        <tbody id="adminUserList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="successBox" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl max-w-sm w-full">
            <h3 class="text-lg font-bold text-green-600 mb-3">✅ 操作成功</h3>
            <p class="mb-4">已完成对应操作</p>
            <button id="successClose" class="px-4 py-2 bg-primary text-white rounded">确定</button>
        </div>
    </div>
</main>

<footer class="bg-secondary text-white py-4 text-center text-sm">
    <p>王者荣耀开黑预约系统 &copy; 2026</p>
    <p class="text-gray-400 mt-1">时段前12小时截止 | 每周日22:00刷新 | 每时段最多2人</p>
</footer>

<script>
// ====================== 后端接口完整保留 ======================
const API_BASE = 'http://localhost:8080/api';
axios.defaults.baseURL = API_BASE;
axios.defaults.headers.post['Content-Type'] = 'application/json';

const LOGIN_KEY = 'loginUser';
const ALL_SLOTS = generateWeekSlots();

// 获取完整预约列表（真实后端）
async function getReserves() {
    try {
        const res = await axios.get('/reserve/list');
        return res.data || [];
    } catch (e) {
        console.error(e);
        return [];
    }
}

// 获取用户列表
async function getUsers() {
    try {
        const res = await axios.get('/user/list');
        return res.data || [];
    } catch (e) {
        return [];
    }
}

// 本地判断时间段是否开放，不联网
function getSlotTime(slot) {
    const [h, m] = slot.start.split(':').map(Number);
    const dt = new Date(slot.date);
    dt.setHours(h, m, 0, 0);
    return dt;
}

function isSlotOpen(slot) {
    const now = new Date();
    const st = getSlotTime(slot);
    if (now >= st) return false;
    const dead = new Date(st - 12 * 60 * 60 * 1000);
    return now < dead;
}

// 时间段结构只渲染一次
function initSlotView() {
    const c = document.getElementById('userSlotContainer');
    const s = document.getElementById('userSlot');
    c.innerHTML = '';
    s.innerHTML = '';

    ALL_SLOTS.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-xl p-4 shadow slot-card';
        div.dataset.index = i;
        div.innerHTML = `
        <div class="flex justify-between"><b>${slot.day}</b><span class="text-sm text-gray-500">${slot.date}</span></div>
        <div class="my-2">${slot.start} - ${slot.end}</div>
        <div class="text-sm slot-status"></div>
        <div class="text-xs mt-1 text-gray-400 slot-count"></div>`;
        c.appendChild(div);

        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${slot.day} ${slot.date} ${slot.start}`;
        s.appendChild(opt);
    });
}

// 只联网刷新：人数、等级、预约记录（不刷新时间段结构）
async function refreshDynamicData() {
    const loginUser = localStorage.getItem(LOGIN_KEY);
    if (!loginUser) return;

    const reserves = await getReserves();
    const users = await getUsers();

    // 统计人数
    const countMap = {};
    reserves.forEach(r => {
        const key = r.date + '|' + r.startTime;
        countMap[key] = (countMap[key] || 0) + 1;
    });

    // 更新时间段人数
    document.querySelectorAll('.slot-card').forEach(card => {
        const i = card.dataset.index;
        const slot = ALL_SLOTS[i];
        const key = slot.date + '|' + slot.start;
        const cnt = countMap[key] || 0;
        const open = isSlotOpen(slot);
        const full = cnt >= 2;

        const statusEl = card.querySelector('.slot-status');
        const countEl = card.querySelector('.slot-count');

        statusEl.className = 'text-sm slot-status ' + (open && !full ? 'text-green-600' : 'text-red-600');
        statusEl.textContent = open ? (full ? '已满员' : '可预约') : '已截止';
        countEl.textContent = `已预约：${cnt}/2`;
    });

    // 我的预约
    const myList = reserves.filter(r => r.name === loginUser);
    renderMyReserves(myList);

    // 等级与次数
    updateUserInfo(loginUser, users, myList);
}

// 渲染我的预约
function renderMyReserves(myList) {
    const html = myList.map((r, idx) => {
        const slot = ALL_SLOTS[r.slotIdx] || {};
        const time = slot.day ? `${slot.day} ${slot.date} ${slot.start}` : '已过期';
        return `
        <tr>
            <td class="p-2">${r.mode}</td>
            <td class="p-2">${r.rank}</td>
            <td class="p-2">${time}</td>
            <td class="p-2">
                <button onclick="cancelMyReserve(${idx})" class="text-red-600">取消预约</button>
            </td>
        </tr>`;
    }).join('') || '<tr><td colspan="4" class="p-2 text-center">暂无预约记录</td></tr>';
    document.getElementById('myReserveList').innerHTML = html;
}

// 更新用户信息
function updateUserInfo(name, users, myList) {
    const user = users.find(u => u.name === name) || { name, level: '普通用户' };
    document.getElementById('showLevel').textContent = user.level;

    const week = getWeekStart();
    const used = myList.filter(r => r.week === week).length;
    const max = user.level === 'SVIP用户' ? 999
              : user.level === 'VIP用户' ? 4
              : user.level === '高级用户' ? 3 : 2;

    document.getElementById('remainNum').textContent = max - used;
    document.getElementById('remainTip').classList.remove('hidden');
}

// ====================== 用户提交预约（真实后端上传） ======================
document.getElementById('userReserveForm').onsubmit = async function (e) {
    e.preventDefault();
    const name = document.getElementById('userNick').value.trim();
    const mode = document.getElementById('userMode').value;
    const rank = document.getElementById('userRank').value.trim();
    const slotIdx = document.getElementById('userSlot').value;
    const slot = ALL_SLOTS[slotIdx];

    const reserves = await getReserves();
    const cnt = reserves.filter(r => r.date === slot.date && r.startTime === slot.start).length;

    if (!isSlotOpen(slot)) return showStatus('时间段已截止', 'error');
    if (cnt >= 2) return showStatus('已满员', 'error');
    if (reserves.some(r => r.name === name && r.date === slot.date && r.startTime === slot.start)) {
        return showStatus('已预约过此时段', 'error');
    }

    try {
        // 真实提交后端
        await axios.post('/reserve/add', {
            name, mode, rank,
            slotIdx: +slotIdx,
            date: slot.date,
            startTime: slot.start,
            week: getWeekStart()
        });

        await refreshDynamicData();
        document.getElementById('successBox').classList.remove('hidden');
    } catch (e) {
        showStatus('提交失败', 'error');
    }
};

// 取消预约（真实后端）
window.cancelMyReserve = async function (idx) {
    const name = localStorage.getItem(LOGIN_KEY);
    const list = await getReserves();
    const myList = list.filter(r => r.name === name);
    const tar = myList[idx];
    if (!confirm('确定取消？')) return;

    try {
        await axios.post('/reserve/delete', {
            nickName: tar.name,
            date: tar.date,
            startTime: tar.startTime
        });
        await refreshDynamicData();
        showStatus('取消成功', 'success');
    } catch (e) {
        showStatus('失败', 'error');
    }
};

// ====================== 管理员完整后端接口 ======================
function showAdminPage(key) {
    document.querySelectorAll('.admin-page').forEach(el => el.style.display = 'none');
    if (key === 'detail') {
        document.getElementById('adminDetailPage').style.display = 'block';
        renderAdminDetail();
    } else if (key === 'help') {
        document.getElementById('adminHelpPage').style.display = 'block';
        fillAdminHelpSlot();
    } else if (key === 'edit') {
        document.getElementById('adminEditPage').style.display = 'block';
        renderAdminEdit();
    } else if (key === 'user') {
        document.getElementById('adminUserPage').style.display = 'block';
        renderAdminUser();
    }
}

async function renderAdminDetail() {
    const list = await getReserves();
    const html = list.map(r => {
        const slot = ALL_SLOTS[r.slotIdx] || {};
        return `<tr>
            <td class="p-2">${r.name}</td>
            <td class="p-2">${r.level || '普通用户'}</td>
            <td class="p-2">${r.mode}</td>
            <td class="p-2">${r.rank}</td>
            <td class="p-2">${slot.day} ${slot.date} ${slot.start}</td>
        </tr>`;
    }).join('') || '<tr><td colspan="5" class="p-2 text-center">暂无预约</td></tr>';
    document.getElementById('adminDetailList').innerHTML = html;
}

async function renderAdminEdit() {
    const list = await getReserves();
    let html = '';
    list.forEach((r, idx) => {
        const slot = ALL_SLOTS[r.slotIdx] || {};
        let opts = '';
        ALL_SLOTS.forEach((s, i) => {
            opts += `<option value="${i}" ${r.slotIdx == i ? 'selected' : ''}>${s.day} ${s.start}</option>`;
        });
        html += `<tr>
            <td class="p-2">${r.name}</td>
            <td class="p-2">${r.mode}</td>
            <td class="p-2">${r.rank}</td>
            <td class="p-2">${slot.day} ${slot.start}</td>
            <td class="p-2"><select class="edit-slot-${idx} border p-1">${opts}</select></td>
            <td class="p-2">
                <button onclick="adminUpdate(${idx})" class="text-blue-600 mr-2">保存</button>
                <button onclick="adminDel(${idx})" class="text-red-600">删除</button>
            </td>
        </tr>`;
    });
    document.getElementById('adminEditList').innerHTML = html || '<tr><td colspan="6" class="p-2 text-center">暂无预约</td></tr>';
}

window.adminUpdate = async function (idx) {
    const list = await getReserves();
    const r = list[idx];
    const slotIdx = document.querySelector(`.edit-slot-${idx}`).value;
    const slot = ALL_SLOTS[slotIdx];
    await axios.post('/reserve/update', {
        id: r.id,
        slotIdx: +slotIdx,
        date: slot.date,
        startTime: slot.start
    });
    showAdminPage('detail');
};

window.adminDel = async function (idx) {
    const list = await getReserves();
    const r = list[idx];
    if (!confirm('确定删除？')) return;
    await axios.post('/reserve/delete', {
        nickName: r.name, date: r.date, startTime: r.startTime
    });
    showAdminPage('detail');
};

async function renderAdminUser() {
    const users = (await getUsers()).filter(u => u.name !== '楠小小风865370');
    const html = users.map((u, i) => `
    <tr>
        <td class="p-2">${u.name}</td>
        <td class="p-2">${u.total || 0}</td>
        <td class="p-2">${u.level}</td>
        <td class="p-2">
            <select onchange="setUserLevel(${i},this.value)">
                <option value="普通用户" ${u.level=='普通用户'?'selected':''}>普通用户</option>
                <option value="高级用户" ${u.level=='高级用户'?'selected':''}>高级用户</option>
                <option value="VIP用户" ${u.level=='VIP用户'?'selected':''}>VIP用户</option>
                <option value="SVIP用户" ${u.level=='SVIP用户'?'selected':''}>SVIP用户</option>
            </select>
        </td>
    </tr>`).join('') || '<tr><td colspan="4" class="p-2 text-center">暂无用户</td></tr>';
    document.getElementById('adminUserList').innerHTML = html;
}

window.setUserLevel = async function (idx, lv) {
    const users = (await getUsers()).filter(u => u.name !== '楠小小风865370');
    const tar = users[idx];
    await axios.post('/user/updateLevel', { id: tar.id, level: lv });
    renderAdminUser();
    showStatus('等级修改成功', 'success');
};

function fillAdminHelpSlot() {
    const sel = document.getElementById('helpSlot');
    sel.innerHTML = '';
    ALL_SLOTS.forEach((slot, i) => {
        if (isSlotOpen(slot)) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${slot.day} ${slot.date} ${slot.start}`;
            sel.appendChild(opt);
        }
    });
}

document.getElementById('adminHelpForm').onsubmit = async e => {
    e.preventDefault();
    const name = document.getElementById('helpNick').value.trim();
    const mode = document.getElementById('helpMode').value;
    const rank = document.getElementById('helpRank').value.trim();
    const slotIdx = document.getElementById('helpSlot').value;
    const slot = ALL_SLOTS[slotIdx];

    await axios.post('/reserve/add', {
        name, mode, rank,
        slotIdx: +slotIdx,
        date: slot.date,
        startTime: slot.start,
        week: getWeekStart()
    });

    showAdminPage('detail');
    document.getElementById('successBox').classList.remove('hidden');
};

// ====================== 工具 ======================
function showStatus(text, type = 'info') {
    const bar = document.getElementById('statusBar');
    const t = document.getElementById('statusText');
    t.textContent = text;
    bar.className = 'mb-6 p-3 rounded-lg text-sm hidden';
    if (type === 'success') bar.classList.add('bg-green-50','border-green-200','text-green-700');
    else if (type === 'error') bar.classList.add('bg-red-50','border-red-200','text-red-700');
    else bar.classList.add('bg-blue-50','border-blue-200','text-blue-700');
    bar.classList.remove('hidden');
    setTimeout(()=>bar.classList.add('hidden'),2500);
}

function getWeekStart(date = new Date()) {
    const d = new Date(date);
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
}

function generateWeekSlots() {
    const now = new Date();
    const slots = [];
    const dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
    const add = (now.getDay()===0 && now.getHours()>=22) ? 7 : 0;
    for(let i=0;i<7;i++){
        const d = new Date();
        d.setDate(now.getDate() - now.getDay() + i + 1 + add);
        const date = d.toISOString().split('T')[0];
        const day = dayNames[i];
        const isWeekend = i>=5;
        if(isWeekend){
            slots.push({date,day,start:'09:30',end:'12:00'});
            slots.push({date,day,start:'14:00',end:'16:00'});
            slots.push({date,day,start:'17:20',end:'21:20'});
            slots.push({date,day,start:'21:30',end:'23:10'});
        }else{
            slots.push({date,day,start:'21:30',end:'23:00'});
        }
    }
    return slots;
}

    localStorage.removeItem(LOGIN_KEY);
    location.reload();
}
document.getElementById('logoutBtn').onclick = logout;

async function afterLogin(name){
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    document.getElementById('showName').textContent = name;

    if(name==='楠小小风865370'){
        document.getElementById('adminMain').classList.remove('hidden');
        document.getElementById('userMain').classList.add('hidden');
        document.getElementById('showLevel').textContent='【管理员】';
        showAdminPage('detail');
        return;
    }

    document.getElementById('userMain').classList.remove('hidden');
    document.getElementById('adminMain').classList.add('hidden');
    document.getElementById('userNick').value=name;
    initSlotView();
    refreshDynamicData();
}

document.getElementById('loginBtn').onclick = function(){
    const name = document.getElementById('loginNick').value.trim();
    if(!name) return showStatus('请输入昵称');
    localStorage.setItem(LOGIN_KEY,name);
    afterLogin(name);
};

document.getElementById('successClose').onclick = ()=>{
    document.getElementById('successBox').classList.add('hidden');
};

// 启动
window.onload = function(){
    const user = localStorage.getItem(LOGIN_KEY);
    if(user) afterLogin(user);
    setInterval(refreshDynamicData, 2000);
};
