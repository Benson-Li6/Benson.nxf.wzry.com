<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>王者荣耀游戏预约系统 - 大神带玩预约平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .card-header {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 18px;
            border-left: 5px solid #f39c12;
            padding-left: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        button, .btn {
            background: #f39c12;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e1e2e;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            margin: 4px 6px;
        }

        button:hover {
            background: #e67e22;
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #f39c12;
            color: #f39c12;
        }

        .btn-outline:hover {
            background: #f39c12;
            color: #1e1e2e;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }

        input, select, textarea {
            background: #0f0f1a;
            border: 1px solid #2d2d44;
            border-radius: 20px;
            padding: 10px 16px;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            margin: 8px 0;
        }

        label {
            font-weight: 500;
            margin-top: 8px;
            display: block;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            margin-top: 18px;
        }

        .slot-card {
            background: #0a0a14;
            border-radius: 20px;
            padding: 16px;
            border-left: 4px solid #f39c12;
        }

        .slot-time {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .slot-info {
            font-size: 0.8rem;
            color: #aaa;
            margin: 8px 0;
        }

        .badge {
            background: #2c3e66;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            display: inline-block;
        }

        .user-info-bar {
            background: #0b0b18;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        .tab-btn {
            background: transparent;
            color: #ccc;
            border: none;
        }
        .tab-btn.active {
            background: #f39c12;
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #2d2d44;
        }

        @media (max-width: 700px) {
            .slot-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 16px;
            }
        }
        .login-screen {
            max-width: 500px;
            margin: 10vh auto;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 0.8rem;
        }
        .success-msg {
            color: #2ecc71;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    let db = {
        users: [],
        bookings: [],
    };

    const ADMIN_NICKNAME = "楠小小风 865370";
    let currentUser = null;
    let currentAdminPanelTab = "bookingList";

    function saveData() {
        localStorage.setItem("game_booking_db", JSON.stringify({
            users: db.users,
            bookings: db.bookings
        }));
    }

    function loadData() {
        const raw = localStorage.getItem("game_booking_db");
        if(raw) {
            try {
                const data = JSON.parse(raw);
                db.users = data.users || [];
                db.bookings = data.bookings || [];
            } catch(e) {}
        }
        if(!db.users.find(u => u.nickname === ADMIN_NICKNAME)) {
            db.users.push({
                nickname: ADMIN_NICKNAME,
                level: "管理员",
                effectiveCount: 0,
                manualLevel: "管理员"
            });
        }
        db.users.forEach(u => {
            if(!u.level) u.level = "普通用户";
            if(u.effectiveCount === undefined) u.effectiveCount = 0;
        });
        saveData();
    }

    function calcLevelByEffective(count) {
        if(count >= 50) return "SVIP用户";
        if(count >= 25) return "VIP用户";
        if(count >= 5) return "高级用户";
        return "普通用户";
    }

    function syncUserLevelByTimes(nickname) {
        const user = db.users.find(u => u.nickname === nickname);
        if(!user || user.nickname === ADMIN_NICKNAME) return;
        const newLevel = calcLevelByEffective(user.effectiveCount);
        if(user.level !== newLevel) {
            user.level = newLevel;
            saveData();
        }
    }

    function adminSetLevel(nickname, newLevel) {
        const user = db.users.find(u => u.nickname === nickname);
        if(!user || user.nickname === ADMIN_NICKNAME) return false;
        user.level = newLevel;
        saveData();
        return true;
    }

    function getUserWeeklyRemaining(nickname) {
        if(nickname === ADMIN_NICKNAME) return Infinity;
        const user = db.users.find(u => u.nickname === nickname);
        if(!user) return 0;
        let limit = 0;
        if(user.level === "普通用户") limit = 2;
        else if(user.level === "高级用户") limit = 3;
        else if(user.level === "VIP用户") limit = 4;
        else if(user.level === "SVIP用户") limit = Infinity;
        else limit = 2;

        const currentWeekSlots = generateCurrentWeekSlots();
        const thisWeekBookingCount = db.bookings.filter(b => 
            b.nickname === nickname && 
            currentWeekSlots.some(slot => slot.key === b.slotKey) &&
            b.status !== "cancelled"
        ).length;
        if(limit === Infinity) return "无限";
        const remaining = limit - thisWeekBookingCount;
        return remaining > 0 ? remaining : 0;
    }

    function canBookThisWeek(nickname) {
        if(nickname === ADMIN_NICKNAME) return false;
        const remaining = getUserWeeklyRemaining(nickname);
        if(remaining === "无限") return true;
        return remaining > 0;
    }

    function generateCurrentWeekSlots() {
        const now = new Date();
        let baseDate = new Date();
        const dayOfWeek = baseDate.getDay();
        let monday = new Date(baseDate);
        const diffToMonday = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek);
        monday.setDate(baseDate.getDate() + diffToMonday);
        monday.setHours(0,0,0,0);
        
        let sundayThisWeek = new Date(monday);
        sundayThisWeek.setDate(monday.getDate() + 6);
        sundayThisWeek.setHours(22,0,0,0);
        if(now >= sundayThisWeek) {
            monday.setDate(monday.getDate() + 7);
        }
        
        const slots = [];
        for(let i = 0; i < 7; i++) {
            const currentDate = new Date(monday);
            currentDate.setDate(monday.getDate() + i);
            const weekDay = currentDate.getDay();
            const yyyymmdd = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;
            const weekName = ["周日","周一","周二","周三","周四","周五","周六"][weekDay];
            if(weekDay >= 1 && weekDay <= 5) {
                const startTime = "21:30";
                const endTime = "23:00";
                const slotKey = `${yyyymmdd}_${weekDay}_${startTime}-${endTime}`;
                slots.push({
                    key: slotKey,
                    date: yyyymmdd,
                    weekName,
                    start: startTime,
                    end: endTime,
                    display: `${yyyymmdd} 周一~五 ${startTime}-${endTime}`,
                    rawStartDateTime: new Date(`${yyyymmdd}T${startTime}:00`),
                    rawEndDateTime: new Date(`${yyyymmdd}T${endTime}:00`)
                });
            } 
            if(weekDay === 6 || weekDay === 0) {
                const periods = [
                    ["09:30","12:00"], ["14:00","16:00"], ["17:20","21:20"], ["21:30","23:10"]
                ];
                periods.forEach(([startTime, endTime]) => {
                    const slotKey = `${yyyymmdd}_${weekDay}_${startTime}-${endTime}`;
                    slots.push({
                        key: slotKey,
                        date: yyyymmdd,
                        weekName,
                        start: startTime,
                        end: endTime,
                        display: `${yyyymmdd} ${weekName} ${startTime}-${endTime}`,
                        rawStartDateTime: new Date(`${yyyymmdd}T${startTime}:00`),
                        rawEndDateTime: new Date(`${yyyymmdd}T${endTime}:00`)
                    });
                });
            }
        }
        return slots;
    }

    function getSlotBookCount(slotKey) {
        return db.bookings.filter(b => b.slotKey === slotKey && b.status !== "cancelled").length;
    }

    function isUserBookedSlot(nickname, slotKey) {
        return db.bookings.some(b => b.nickname === nickname && b.slotKey === slotKey && b.status !== "cancelled");
    }

    function isSlotAvailable(slot, now = new Date()) {
        if(getSlotBookCount(slot.key) >= 2) return false;
        if(now >= slot.rawStartDateTime) return false;
        const deadline = new Date(slot.rawStartDateTime.getTime() - 12 * 60 * 60 * 1000);
        if(now >= deadline) return false;
        return true;
    }

    function addBooking(nickname, slotKey, mode, rankDetail) {
        const user = db.users.find(u => u.nickname === nickname);
        if(!user) return {success: false, msg: "用户不存在"};
        if(nickname === ADMIN_NICKNAME) return {success: false, msg: "管理员账号不可预约，请使用帮助预约功能"};
        if(!canBookThisWeek(nickname)) {
            return {success: false, msg: `本周预约次数已达上限(${getUserWeeklyRemaining(nickname)}剩余0次)`};
        }
        const allSlots = generateCurrentWeekSlots();
        const targetSlot = allSlots.find(s => s.key === slotKey);
        if(!targetSlot) return {success: false, msg: "时段无效"};
        if(!isSlotAvailable(targetSlot, new Date())) {
            return {success: false, msg: "该时段已满员/已过期/已停止预约(开始前12h截止)"};
        }
        if(isUserBookedSlot(nickname, slotKey)) {
            return {success: false, msg: "您已预约过该时段，不可重复预约"};
        }
        const newBooking = {
            id: Date.now() + Math.random() + nickname,
            nickname,
            slotKey,
            mode,
            rankDetail,
            createdAt: new Date().toISOString(),
            status: "active"
        };
        db.bookings.push(newBooking);
        user.effectiveCount += 1;
        syncUserLevelByTimes(nickname);
        saveData();
        return {success: true, msg: "预约成功！"};
    }

    function cancelBooking(bookingId, nickname) {
        const booking = db.bookings.find(b => b.id == bookingId && b.nickname === nickname);
        if(!booking) return false;
        if(booking.status === "cancelled") return false;
        booking.status = "cancelled";
        const user = db.users.find(u => u.nickname === nickname);
        if(user && user.effectiveCount > 0) user.effectiveCount -= 1;
        syncUserLevelByTimes(nickname);
        saveData();
        return true;
    }

    function adminDeleteBooking(bookingId) {
        const booking = db.bookings.find(b => b.id == bookingId);
        if(!booking) return false;
        if(booking.status === "cancelled") return false;
        booking.status = "cancelled";
        const user = db.users.find(u => u.nickname === booking.nickname);
        if(user && user.effectiveCount > 0) user.effectiveCount -= 1;
        syncUserLevelByTimes(booking.nickname);
        saveData();
        return true;
    }

    function adminModifyBookingSlot(bookingId, newSlotKey) {
        const booking = db.bookings.find(b => b.id == bookingId);
        if(!booking || booking.status === "cancelled") return false;
        const allSlots = generateCurrentWeekSlots();
        const targetSlot = allSlots.find(s => s.key === newSlotKey);
        if(!targetSlot) return false;
        if(getSlotBookCount(newSlotKey) >= 2) return false;
        if(!isSlotAvailable(targetSlot, new Date())) return false;
        const sameUserSlot = db.bookings.find(b => b.nickname === booking.nickname && b.slotKey === newSlotKey && b.status !== "cancelled" && b.id !== bookingId);
        if(sameUserSlot) return false;
        booking.slotKey = newSlotKey;
        saveData();
        return true;
    }

    function getNormalUsers() {
        return db.users.filter(u => u.nickname !== ADMIN_NICKNAME);
    }

    function weeklyRefreshClean() {
        const now = new Date();
        const allSlots = generateCurrentWeekSlots();
        const validSlotKeys = new Set(allSlots.map(s => s.key));
        const toDelete = db.bookings.filter(b => !validSlotKeys.has(b.slotKey) && b.status !== "cancelled");
        toDelete.forEach(booking => {
            booking.status = "expired_auto";
        });
        saveData();
    }

    let currentRenderSlots = [];
    function renderApp() {
        const app = document.getElementById("app");
        if(!currentUser) {
            renderLoginScreen(app);
            return;
        }
        if(currentUser.nickname === ADMIN_NICKNAME) {
            renderAdminPanel(app);
        } else {
            renderUserPanel(app);
        }
    }

    function renderLoginScreen(app) {
        app.innerHTML = `
            <div class="container login-screen">
                <div class="card">
                    <div class="card-header">🎮 王者预约系统 · 登录</div>
                    <div>
                        <label>游戏昵称</label>
                        <input type="text" id="loginNickname" placeholder="输入游戏昵称" autocomplete="off">
                        <button id="doLoginBtn" style="margin-top: 20px;">登录/注册</button>
                        <div id="loginMsg" class="error-msg"></div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("doLoginBtn").onclick = () => {
            const nick = document.getElementById("loginNickname").value.trim();
            if(!nick) {document.getElementById("loginMsg").innerText="请输入昵称";return;}
            let user = db.users.find(u => u.nickname === nick);
            if(!user) {
                user = { nickname: nick, level: "普通用户", effectiveCount: 0 };
                db.users.push(user);
                saveData();
            }
            currentUser = user;
            renderApp();
        };
    }

    function renderUserPanel(app) {
        const slots = generateCurrentWeekSlots();
        currentRenderSlots = slots;
        const remaining = getUserWeeklyRemaining(currentUser.nickname);
        const remainText = (remaining === "无限") ? "无限次" : `${remaining} 次`;
        const myBookings = db.bookings.filter(b => b.nickname === currentUser.nickname && b.status !== "cancelled");
        app.innerHTML = `
            <div class="container">
                <div class="user-info-bar">
                    <div>🎮 ${currentUser.nickname} | 等级: ${currentUser.level} | 本周可预约: ${remainText}</div>
                    <div><button id="logoutBtn" class="btn-outline">🚪 退出登录</button></div>
                </div>
                <div class="card">
                    <div class="card-header">📅 可预约时段 (容量2人/时段)</div>
                    <div class="slot-grid" id="slotGrid"></div>
                </div>
                <div class="card">
                    <div class="card-header">📋 我的预约记录</div>
                    <div id="myBookingsList"></div>
                </div>
            </div>
        `;
        document.getElementById("logoutBtn").onclick = () => { currentUser = null; renderApp(); };
        renderSlotGrid();
        renderUserBookings(myBookings);
    }

    function renderSlotGrid() {
        const container = document.getElementById("slotGrid");
        if(!container) return;
        const now = new Date();
        container.innerHTML = currentRenderSlots.map(slot => {
            const count = getSlotBookCount(slot.key);
            const available = isSlotAvailable(slot, now);
            const disabled = !available || count>=2;
            return `
                <div class="slot-card">
                    <div class="slot-time">📆 ${slot.display}</div>
                    <div class="slot-info">👥 预约人数: ${count}/2</div>
                    <div class="slot-info">⏰ ${available ? "可预约" : "不可约(满员/超时/提前12h截止)"}</div>
                    <button class="book-btn" data-key="${slot.key}" ${disabled ? "disabled style='opacity:0.5'" : ""}>预约此时间段</button>
                </div>
            `;
        }).join("");
        document.querySelectorAll(".book-btn").forEach(btn => {
            btn.onclick = () => {
                const slotKey = btn.dataset.key;
                showBookingModal(slotKey);
            };
        });
    }

    function showBookingModal(slotKey) {
        const slot = currentRenderSlots.find(s => s.key === slotKey);
        if(!slot) return;
        const modalHtml = `
            <div id="bookingModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;">
                <div class="card" style="width:350px;">
                    <h3>预约时段</h3>
                    <p>${slot.display}</p>
                    <label>模式</label>
                    <select id="modeSelect"><option>娱乐</option><option>技术</option></select>
                    <label>详细段位 (如 最强王者20星)</label>
                    <input id="rankDetailInput" placeholder="例: 至尊星耀5">
                    <div style="display:flex; justify-content:space-between; margin-top:20px;">
                        <button id="confirmBookBtn">确认预约</button>
                        <button id="closeModalBtn">取消</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML("beforeend", modalHtml);
        document.getElementById("closeModalBtn").onclick = () => document.getElementById("bookingModal")?.remove();
        document.getElementById("confirmBookBtn").onclick = () => {
            const mode = document.getElementById("modeSelect").value;
            const rank = document.getElementById("rankDetailInput").value.trim() || "未填写";
            const res = addBooking(currentUser.nickname, slotKey, mode, rank);
            alert(res.msg);
            document.getElementById("bookingModal")?.remove();
            if(res.success) {
                if(confirm("预约成功！是否继续预约？\n确定继续/取消返回首页")) {
                    renderApp();
                } else {
                    renderApp();
                }
            } else {
                renderApp();
            }
        };
    }

    function renderUserBookings(bookings) {
        const container = document.getElementById("myBookingsList");
        if(!container) return;
        if(bookings.length===0) { container.innerHTML = "<div>暂无预约记录</div>"; return;}
        container.innerHTML = `<table><tr><th>时段</th><th>模式</th><th>段位</th><th>操作</th></tr>${
            bookings.map(b => {
                const slot = generateCurrentWeekSlots().find(s => s.key === b.slotKey);
                const display = slot ? slot.display : b.slotKey;
                return `<tr><td>${display}</td><td>${b.mode}</td><td>${b.rankDetail}</td><td><button class="cancel-btn" data-id="${b.id}">取消预约</button></td></tr>`;
            }).join("")
        }</table>`;
        document.querySelectorAll(".cancel-btn").forEach(btn => {
            btn.onclick = () => {
                if(confirm("取消预约后不计入有效预约次数，释放名额。确定取消？")){
                    cancelBooking(btn.dataset.id, currentUser.nickname);
                    renderApp();
                }
            };
        });
    }

    function renderAdminPanel(app) {
        const normalUsers = getNormalUsers();
        app.innerHTML = `
            <div class="container">
                <div class="user-info-bar">
                    <div>🔧 管理员: ${ADMIN_NICKNAME} | 权限面板</div>
                    <button id="adminLogoutBtn" class="btn-outline">退出登录</button>
                </div>
                <div class="card">
                    <div class="admin-tabs" id="adminTabs">
                        <button data-tab="bookingList" class="tab-btn active">📋 预约详情</button>
                        <button data-tab="helpBook" class="tab-btn">🤝 帮助预约</button>
                        <button data-tab="modifyBooking" class="tab-btn">✏️ 预约修改</button>
                        <button data-tab="userManage" class="tab-btn">👥 用户等级管理</button>
                    </div>
                    <div id="adminTabContent"></div>
                </div>
            </div>
        `;
        document.getElementById("adminLogoutBtn").onclick = () => { currentUser = null; renderApp(); };
        document.querySelectorAll("[data-tab]").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentAdminPanelTab = btn.dataset.tab;
                renderAdminTabContent();
            };
        });
        renderAdminTabContent();
    }

    function renderAdminTabContent() {
        const container = document.getElementById("adminTabContent");
        if(!container) return;
        if(currentAdminPanelTab === "bookingList") {
            const allActive = db.bookings.filter(b => b.status !== "cancelled");
            container.innerHTML = `<h3>所有预约信息</h3><table><tr><th>玩家</th><th>时段</th><th>模式</th><th>段位</th></tr>${
                allActive.map(b => {
                    const slot = generateCurrentWeekSlots().find(s => s.key === b.slotKey);
                    const display = slot ? slot.display : b.slotKey;
                    return `<tr><td>${b.nickname}</td><td>${display}</td><td>${b.mode}</td><td>${b.rankDetail}</td></tr>`;
                }).join("")
            }</table>`;
        }
        else if(currentAdminPanelTab === "helpBook") {
            container.innerHTML = `
                <h3>帮助其他用户预约</h3>
                <label>玩家昵称</label><input id="helpNickname">
                <label>选择时段</label><select id="helpSlotSelect"></select>
                <label>模式</label><select id="helpMode"><option>娱乐</option><option>技术</option></select>
                <label>段位详情</label><input id="helpRank">
                <button id="doHelpBookBtn">代为预约</button>
                <div id="helpMsg"></div>
            `;
            const slots = generateCurrentWeekSlots();
            const select = document.getElementById("helpSlotSelect");
            select.innerHTML = slots.map(s => `<option value="${s.key}">${s.display} (${getSlotBookCount(s.key)}/2)</option>`).join("");
            document.getElementById("doHelpBookBtn").onclick = () => {
                const nick = document.getElementById("helpNickname").value.trim();
                const slotKey = document.getElementById("helpSlotSelect").value;
                const mode = document.getElementById("helpMode").value;
                const rank = document.getElementById("helpRank").value.trim() || "未填写";
                if(!nick) { alert("输入昵称"); return; }
                const targetUser = db.users.find(u => u.nickname === nick);
                if(!targetUser) { alert("用户不存在，请先让该用户登录一次"); return; }
                const res = addBooking(nick, slotKey, mode, rank);
                document.getElementById("helpMsg").innerText = res.msg;
                if(res.success) renderAdminTabContent();
            };
        }
        else if(currentAdminPanelTab === "modifyBooking") {
            const allBookings = db.bookings.filter(b => b.status !== "cancelled");
            container.innerHTML = `<h3>修改/删除预约 (帮助管理)</h3><div id="modifyList"></div>`;
            const modifyDiv = document.getElementById("modifyList");
            modifyDiv.innerHTML = `<table><tr><th>玩家</th><th>时段</th><th>操作</th></tr>${
                allBookings.map(b => {
                    const slot = generateCurrentWeekSlots().find(s => s.key === b.slotKey);
                    const disp = slot ? slot.display : b.slotKey;
                    return `<tr><td>${b.nickname}</td><td>${disp}</td><td><button class="delBookingBtn" data-id="${b.id}">❌删除</button> <button class="modSlotBtn" data-id="${b.id}">🕒改时段</button></td></tr>`;
                }).join("")
            }</table>`;
            document.querySelectorAll(".delBookingBtn").forEach(btn => {
                btn.onclick = () => { if(confirm("删除后不计入有效次数")){ adminDeleteBooking(btn.dataset.id); renderAdminTabContent(); } };
            });
            document.querySelectorAll(".modSlotBtn").forEach(btn => {
                btn.onclick = async () => {
                    const newSlotKey = prompt("输入新时段key (可查看上方预约详情时段列表的key,格式如2025-03-17_Mon_21:30-23:00)");
                    if(newSlotKey && adminModifyBookingSlot(btn.dataset.id, newSlotKey)) alert("修改成功");
                    else alert("修改失败(容量满/重复/时段无效)");
                    renderAdminTabContent();
                };
            });
        }
        else if(currentAdminPanelTab === "userManage") {
            const users = getNormalUsers();
            container.innerHTML = `<h3>用户等级管理</h3><table><tr><th>昵称</th><th>当前等级</th><th>有效预约次数</th><th>修改等级</th></tr>${
                users.map(u => `<tr><td>${u.nickname}</td><td>${u.level}</td><td>${u.effectiveCount}</td><td><select id="levelSelect-${u.nickname}"><option>普通用户</option><option>高级用户</option><option>VIP用户</option><option>SVIP用户</option></select><button class="updateLevelBtn" data-nick="${u.nickname}">应用</button></td></tr>`).join("")
            }</table>`;
            users.forEach(u => {
                const btn = document.querySelector(`.updateLevelBtn[data-nick="${u.nickname}"]`);
                if(btn) btn.onclick = () => {
                    const select = document.getElementById(`levelSelect-${u.nickname}`);
                    const newLevel = select.value;
                    adminSetLevel(u.nickname, newLevel);
                    renderAdminTabContent();
                };
            });
        }
    }

    function init() {
        loadData();
        weeklyRefreshClean();
        renderApp();
        setInterval(() => {
            weeklyRefreshClean();
            renderApp();
        }, 60000);
    }
    init();
</script>
</body>
</html>
